	[plugins.inputs]
	# The base url of your site (optional, default: main URL set in Netlify)
	baseUrl = "https://ramiroruiz.com"

	# Path to the feed URL (optional, default: /feed.xml)
	feedPath = "/index.xml"

  [[headers]]
    for = "/.well-known/atproto-did"
    [headers.values]
      Content-Type = "text/plain"