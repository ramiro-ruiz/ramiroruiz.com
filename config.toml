[Params]
og_image = "imgs/og-img.jpg"
author = "Ramiro Ruiz"
leadIntro = "I'm Ramiro, a designer & digital builder from Monterrey, Mexico. Welcome, here you'll find a little <a href=\"/about\">about me</a>, my <a href=\"/notes\">thoughts</a>, <a href=\"/likes\">likes</a>, <a href=\"/replies\">replies</a> and <a href=\"/links\">links</a> I&nbsp;find&nbsp;interesting."
[Params.Author]
name = "Ramiro Ruiz"
email = "yo@ramiroruiz.com"

